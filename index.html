<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ini apa hayoo.. ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* PASSWORD SCREEN */
.lock-screen {
    position: absolute;
    text-align: center;
    color: white;
}

input {
    padding: 10px;
    border-radius: 20px;
    border: none;
    margin-top: 10px;
    text-align: center;
}

button {
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    background: white;
    color: #ff4d88;
    margin-top: 10px;
    cursor: pointer;
}

/* MAIN */
.container {
    display: none;
    width: 100%;
    height: 100%;
    position: relative;
}

/* Envelope background decoration */
.envelope-bg {
    position: absolute;
    width: 220px;
    height: 140px;
    background: #ff4d6d;
    border-radius: 12px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.3;
}

/* Centered Letter */
.letter {
    position: absolute;
    width: 280px;
    background: white;
    color: #333;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -40%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
}

.couple-photo {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

.message {
    font-size: 14px;
    min-height: 90px;
    margin-bottom: 10px;
}

/* Reveal Button */
.reveal-btn {
    font-size: 12px;
    color: #ff4d88;
    cursor: pointer;
}

/* POPUP MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal img {
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    animation: popUp 0.4s ease;
}

@keyframes popUp {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Floating Hearts */
.heart {
    position: absolute;
    animation: floatUp 5s linear infinite;
    font-size: 20px;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="your-song.mp3" loop></audio>

<div class="lock-screen">
    <h2>Enter Our Special Date 💕</h2>
    <input type="password" id="password">
    <br>
    <button onclick="unlock()">Unlock ❤️</button>
</div>

<div class="container">

    <div class="envelope-bg"></div>

    <div class="letter">
        <img src="your-photo.JPG" class="couple-photo">

        <h3>Happy Birthday, Mbuuuul 🎂</h3>
        <div class="message" id="typewriter"></div>

        <div class="reveal-btn" onclick="openModal()">
            Tap here to open your angpao 😚
        </div>
    </div>
</div>

<!-- POPUP -->
<div class="modal" id="modal" onclick="closeModal()">
    <img src="transfer-proof.jpg">
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const correctPassword = "23032023"; // CHANGE

function unlock() {
    const input = document.getElementById("password").value;
    if (input === correctPassword) {
        document.querySelector(".lock-screen").style.display = "none";
        document.querySelector(".container").style.display = "block";
        document.getElementById("bgMusic").play();
        startHearts();
        confetti({ particleCount: 120, spread: 70 });
        typeWriter();
    } else {
        alert("Salah wuuuuu 😝, coba lagii");
    }
}

function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

const text = `To the cutest girl in my life,

Thank you for being my safe place, my happiness, and my favorite notification.

I hope today you feel as special as you make me feel every single day.

I love you endlessly. Pinduuuud ❤️`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.innerHTML = "💖";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 800);
}
</script>

</body>
</html>
